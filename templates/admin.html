<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
    <link rel="icon" href="https://bornforthis.cn/favicon.ico">
</head>
<body>
<div class="container">
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="logo">AI悦创·编程1v1</a>
        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}">主页</a></li>
            <li><a href="{{ url_for('user_login') }}">用户登录</a></li>
            <li><a href="{{ url_for('login') }}">管理员登录</a></li>
            <li><a href="{{ url_for('purchase') }}">购买</a></li>
        </ul>
    </nav>
    <h1>管理后台</h1>

    <div class="admin-controls">
        <!-- 添加用户按钮 -->
        <button id="addUserButton" class="btn">添加用户</button>

        <div class="admin-view-switch" role="tablist" aria-label="管理视图">
            <button type="button"
                    class="view-tab {{ 'is-active' if initial_view == 'active' else '' }}"
                    data-admin-view="active"
                    data-view-url="{{ url_for('admin_users_view', view_name='active') }}"
                    role="tab"
                    aria-selected="{{ 'true' if initial_view == 'active' else 'false' }}">
                用户列表 <span>{{ active_user_count }}</span>
            </button>
            <button type="button"
                    class="view-tab {{ 'is-active' if initial_view == 'auto_deleted' else '' }}"
                    data-admin-view="auto_deleted"
                    data-view-url="{{ url_for('admin_users_view', view_name='auto_deleted') }}"
                    role="tab"
                    aria-selected="{{ 'true' if initial_view == 'auto_deleted' else 'false' }}">
                过期删除管理 <span>{{ auto_deleted_user_count }}</span>
            </button>
        </div>
    </div>

    <!-- 添加用户对话框 -->
    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>添加新用户</h2>
            <form method="post" action="{{ url_for('admin') }}">
                <input type="hidden" name="current_view" id="addUserCurrentView" value="{{ initial_view }}">
                <label for="username">用户名</label>
                <input type="text" name="username" id="username" required>

                <label for="password">密码</label>
                <input type="password" name="password" id="password" required>

                <label for="expiration_days">有效期天数</label>
                <input type="number" name="expiration_days" id="expiration_days" value="30" required>

                <button type="submit">提交</button>
            </form>
        </div>
    </div>

    <div id="adminView" data-current-view="{{ initial_view }}">
        {% if initial_view == 'auto_deleted' %}
            {% include '_admin_auto_deleted_users.html' %}
        {% else %}
            {% include '_admin_active_users.html' %}
        {% endif %}
    </div>

    <!-- 登出链接 -->
    <a href="{{ url_for('logout') }}" class="logout">退出登录</a>
</div>

<script>
    const PAGE_SCROLL_KEY = "admin-page-scroll-y";
    const TABLE_SCROLL_KEY = "admin-table-scroll";
    const ADMIN_BASE_URL = "{{ url_for('admin') }}";

    const savedPageScrollY = sessionStorage.getItem(PAGE_SCROLL_KEY);
    if (savedPageScrollY !== null) {
        window.scrollTo(0, parseInt(savedPageScrollY, 10) || 0);
        sessionStorage.removeItem(PAGE_SCROLL_KEY);
    }

    const savedTableScroll = sessionStorage.getItem(TABLE_SCROLL_KEY);
    const restoredTableContainer = document.querySelector("#adminView .table-container");
    if (savedTableScroll && restoredTableContainer) {
        try {
            const parsed = JSON.parse(savedTableScroll);
            restoredTableContainer.scrollTop = parsed.top || 0;
            restoredTableContainer.scrollLeft = parsed.left || 0;
        } catch (e) {
            console.error("恢复表格滚动位置失败:", e);
        }
        sessionStorage.removeItem(TABLE_SCROLL_KEY);
    }

    document.addEventListener("submit", (event) => {
        const form = event.target;
        if (form instanceof HTMLFormElement && form.method.toLowerCase() === "post") {
            const tableContainer = document.querySelector("#adminView .table-container");
            sessionStorage.setItem(PAGE_SCROLL_KEY, String(window.scrollY));
            if (tableContainer) {
                sessionStorage.setItem(TABLE_SCROLL_KEY, JSON.stringify({
                    top: tableContainer.scrollTop,
                    left: tableContainer.scrollLeft
                }));
            }
        }
    });

    const adminView = document.getElementById("adminView");
    const viewTabs = Array.from(document.querySelectorAll("[data-admin-view]"));
    const addUserCurrentView = document.getElementById("addUserCurrentView");

    function setActiveView(viewName) {
        viewTabs.forEach((tab) => {
            const isActive = tab.dataset.adminView === viewName;
            tab.classList.toggle("is-active", isActive);
            tab.setAttribute("aria-selected", String(isActive));
        });
        if (addUserCurrentView) {
            addUserCurrentView.value = viewName;
        }
    }

    function getViewFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get("view") === "auto_deleted" ? "auto_deleted" : "active";
    }

    async function loadAdminView(viewName, updateUrl = true) {
        const tab = viewTabs.find((item) => item.dataset.adminView === viewName);
        if (!tab || !adminView) {
            return;
        }

        if (adminView.dataset.currentView === viewName) {
            setActiveView(viewName);
            return;
        }

        adminView.classList.add("is-loading");
        try {
            const response = await fetch(tab.dataset.viewUrl, {
                headers: {"X-Requested-With": "XMLHttpRequest"}
            });
            if (response.redirected) {
                window.location.href = response.url;
                return;
            }
            if (!response.ok) {
                throw new Error(`加载失败：${response.status}`);
            }
            adminView.innerHTML = await response.text();
            adminView.dataset.currentView = viewName;
            setActiveView(viewName);

            if (updateUrl) {
                const nextUrl = new URL(window.location.href);
                nextUrl.searchParams.set("view", viewName);
                history.pushState({adminView: viewName}, "", nextUrl);
            }
        } catch (error) {
            console.error("切换管理视图失败:", error);
            window.location.href = `${ADMIN_BASE_URL}?view=${encodeURIComponent(viewName)}`;
        } finally {
            adminView.classList.remove("is-loading");
        }
    }

    viewTabs.forEach((tab) => {
        tab.addEventListener("click", () => {
            loadAdminView(tab.dataset.adminView);
        });
    });

    window.addEventListener("popstate", () => {
        loadAdminView(getViewFromUrl(), false);
    });

    setActiveView(adminView ? adminView.dataset.currentView : "{{ initial_view }}");

    // 获取对话框元素
    const modal = document.getElementById("addUserModal");
    const addUserButton = document.getElementById("addUserButton");
    const closeModal = document.getElementsByClassName("close")[0];

    // 点击“添加用户”按钮打开对话框
    addUserButton.onclick = function () {
        modal.style.display = "block";
    };

    // 点击“关闭”按钮关闭对话框
    closeModal.onclick = function () {
        modal.style.display = "none";
    };

    // 点击对话框外部关闭对话框
    window.addEventListener("click", function (event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    });
</script>
</body>
</html>
